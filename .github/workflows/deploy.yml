name: CI-CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Backend
        working-directory: zz-spring-boot-in-10-steps
        run: mvn clean package -DskipTests

      - name: Debug folders
        run: ls -R 

      - name: Build Frontend
        working-directory: todo-frontend
        run: |
          npm install
          npm run build

      - name: Build Docker Images
        run: |
          docker build -t adwaitpawar/backend ./backend
          docker build -t adwaitpawar/frontend ./frontend

      - name: Push to DockerHub
        run: |
          docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}
          docker push adwaitpawar/backend
          docker push adwaitpawar/frontend
